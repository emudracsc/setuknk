<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setu Suvidha Kendra | All In One Services</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #38bdf8;
            font-weight: 600;
            margin-bottom: 40px;
            text-transform: uppercase;
            display: block;
        }

        /* 3D Button Grid */
        .button-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            perspective: 1000px; /* For 3D Effect */
        }

        .btn-3d {
            position: relative;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            border-radius: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
            box-shadow: 0 8px 0 #1d4ed8, 0 15px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* Hover Animation */
        .btn-3d:hover {
            transform: translateY(-3px) rotateX(10deg);
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
            box-shadow: 0 10px 0 #1d4ed8, 0 20px 25px rgba(0,0,0,0.4);
        }

        .btn-3d:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #1d4ed8, 0 5px 10px rgba(0,0,0,0.3);
        }

        /* Different Colors for Each Button */
        .btn-1 { background: linear-gradient(145deg, #ef4444, #dc2626); box-shadow: 0 8px 0 #991b1b; } /* Red */
        .btn-1:hover { box-shadow: 0 10px 0 #991b1b, 0 20px 25px rgba(0,0,0,0.3); }

        .btn-2 { background: linear-gradient(145deg, #10b981, #059669); box-shadow: 0 8px 0 #065f46; } /* Green */
        .btn-2:hover { box-shadow: 0 10px 0 #065f46, 0 20px 25px rgba(0,0,0,0.3); }

        .btn-3 { background: linear-gradient(145deg, #f59e0b, #d97706); box-shadow: 0 8px 0 #92400e; } /* Orange */
        .btn-3:hover { box-shadow: 0 10px 0 #92400e, 0 20px 25px rgba(0,0,0,0.3); }

        .btn-4 { background: linear-gradient(145deg, #8b5cf6, #7c3aed); box-shadow: 0 8px 0 #5b21b6; } /* Purple */
        .btn-4:hover { box-shadow: 0 10px 0 #5b21b6, 0 20px 25px rgba(0,0,0,0.3); }

        .btn-5 { background: linear-gradient(145deg, #ec4899, #db2777); box-shadow: 0 8px 0 #9d174d; } /* Pink */
        .btn-5:hover { box-shadow: 0 10px 0 #9d174d, 0 20px 25px rgba(0,0,0,0.3); }

        .icon { font-size: 1.5rem; }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

        <span class="subtitle">All In One Services</span>

                <span class="icon">🏠</span>Server No 1

            <!-- Button 3 -->
            <a href="https://script.google.com/macros/s/AKfycbyPpb-vynbLGvnBgQ_4ChH8Gw3YFJhaEijrZWobd0TOrQ3BOQEMQSZWyJAt85Ewe4s/exec" class="btn-3d btn-3" target="_blank">
                <span class="icon">📜</span> Server No 2
            </a>

            <!-- Button 4 -->
            <a href="https://script.google.com/macros/s/AKfycbzaaJ56jkTAealuWGLpsbIsGcIPQ3LJbfIrC2eXQcghjrPhCLjcCYJ0e0FOfXZ1hLso/exec" class="btn-3d btn-4" target="_blank">

        </div>
    </div>

</body>
</html>
